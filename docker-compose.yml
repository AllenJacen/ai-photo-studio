version: "3.9"

services:
  # ─── 基础设施 ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aiphoto-postgres
    environment:
      POSTGRES_DB: aiphoto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aiphoto-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO — S3-compatible local storage (替代 AWS S3 / 阿里云 OSS)
  minio:
    image: minio/minio:latest
    container_name: aiphoto-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── 后端服务 ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiphoto-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aiphoto
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BUCKET: ai-photo-studio
      STORAGE_REGION: us-east-1
      STORAGE_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        python app/db/seed.py &&
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiphoto-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aiphoto
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      STORAGE_BUCKET: ai-photo-studio
      STORAGE_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - backend
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker -Q generation -c 2 --loglevel=info

  # Celery Flower — 监控 Worker 任务队列
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiphoto-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - worker
    ports:
      - "5555:5555"
    command: celery -A app.workers.celery_app flower --port=5555
    volumes:
      - ./backend:/app

  # ─── 前端 ────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiphoto-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
